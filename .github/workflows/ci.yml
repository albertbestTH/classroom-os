name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: classroom_os
          POSTGRES_USER: classroom
          POSTGRES_PASSWORD: classroom_ci_only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U classroom -d classroom_os"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      DATABASE_URL: postgresql://classroom:classroom_ci_only@localhost:5432/classroom_os?schema=public

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm through Corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Locate pnpm store
        id: pnpm-cache
        shell: bash
        run: echo "store_path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Apply database migrations
        run: pnpm --filter @classroom-os/database exec prisma migrate deploy

      - name: Run database tests
        run: pnpm db:test

      - name: Lint workspace
        run: pnpm lint

      - name: Build workspace
        run: pnpm build
